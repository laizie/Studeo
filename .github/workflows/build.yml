name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Import the Developer ID certificate into a temporary keychain so
      # codesign can find it. The keychain is deleted in the cleanup step.
      - name: Import signing certificate
        if: ${{ env.APPLE_CERT_P12 != '' }}
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 20)

          # Create a fresh keychain that only lives for this job
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import the certificate
          echo "$CERT_P12_BASE64" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Allow codesign to use the key without a password prompt
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build and sign (macOS)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_TEAM_NAME: ${{ secrets.APPLE_TEAM_NAME }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: npm run make -- --platform=darwin

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain" || true

      # Give the DMG a stable filename so the README's
      # releases/latest/download/Studeo-macOS.dmg link works for every version.
      - name: Rename DMG to stable name
        run: mv out/make/*.dmg out/make/Studeo-macOS.dmg

      # Upload BOTH:
      #  - the DMG  -> first-time install (what people download from Releases)
      #  - the ZIP  -> what the Squirrel.Mac auto-updater actually consumes.
      #               Keep its versioned name so update.electronjs.org can match it.
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Studeo-macOS
          path: |
            out/make/Studeo-macOS.dmg
            out/make/zip/darwin/**/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Windows)
        run: npm run make -- --platform=win32

      # Upload the FULL Squirrel output, not just the installer. The
      # Squirrel.Windows auto-updater needs RELEASES + the *.nupkg alongside
      # StudeoSetup.exe; uploading only the .exe breaks auto-update.
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Studeo-Windows
          path: out/make/squirrel.windows/**/*

  # Fan-in job: waits for both builds, downloads their installers, and
  # attaches them to a draft release for the pushed tag. Draft means
  # nothing goes public until you click Publish on the Releases page.
  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: installers
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: installers/**
